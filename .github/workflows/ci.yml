name: CI

on:
  push:
    branches: [main, "rehaul/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install Typst
        run: |
          TYPST_VERSION=0.14.2
          curl -fsSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
            | sudo tar -xJ --strip-components=1 -C /usr/local/bin "typst-x86_64-unknown-linux-musl/typst"
          typst --version

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Lint
        run: ruff check backend ops

      - name: Tests (incl. golden Typst compiles)
        run: pytest backend/tests -q

      - name: Deploy-protocol tests
        run: pytest ops/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Typecheck + build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Docker build (smoke)
        run: docker build -t cvglowup:ci .
