# Deploys to Google Cloud Run. Requires one-time setup documented in
# docs/deploy.md (service account, Artifact Registry repo, Secret Manager
# secrets). Trigger manually, or push a v* tag.
name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  REGION: europe-west1
  SERVICE: cvglowup
  REPO: cvglowup

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Refuses to run until the repository secrets exist.
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image with Cloud Build
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${REPO}/${SERVICE}:${GITHUB_SHA::12}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          gcloud builds submit --project "${{ vars.GCP_PROJECT_ID }}" --tag "$IMAGE" .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --image "$IMAGE" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 1Gi --cpu 1 \
            --concurrency 40 \
            --min-instances 0 --max-instances 4 \
            --set-env-vars "ENV=prod,ALLOWED_ORIGINS=https://cvglowup.com,https://www.cvglowup.com" \
            --set-secrets "SECRET_KEY=cvg-secret-key:latest,GEMINI_API_KEY=cvg-gemini-key:latest,DATABASE_URL=cvg-database-url:latest"

      - name: Smoke check
        run: |
          URL=$(gcloud run services describe "$SERVICE" --project "${{ vars.GCP_PROJECT_ID }}" --region "$REGION" --format 'value(status.url)')
          curl -fsS "$URL/healthz"
          curl -fsS "$URL/api/config" | head -c 300
