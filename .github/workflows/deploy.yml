# Zero-downtime deploy to Cloud Run via ops/deploy.py (the same protocol used
# for local deploys — single source of truth). One-time setup in docs/deploy.md:
# service account key in secret GCP_SA_KEY, project id in variable GCP_PROJECT_ID.
#
# Flow: gate (tests) -> build candidate revision with --no-traffic -> smoke it
# on its tagged URL -> promote traffic -> smoke prod -> auto-rollback on failure.
name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: deploy-cvglowup
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install Typst
        run: |
          TYPST_VERSION=0.14.2
          curl -fsSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
            | sudo tar -xJ --strip-components=1 -C /usr/local/bin "typst-x86_64-unknown-linux-musl/typst"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Lint
        run: ruff check backend ops

      - name: Backend tests
        run: pytest backend/tests -q

      - name: Deploy-protocol tests
        run: pytest ops/tests -q

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend typecheck + build
        working-directory: frontend
        run: |
          npm ci --no-fund --no-audit
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy (candidate -> smoke -> promote -> verify, auto-rollback)
        run: python ops/deploy.py deploy --skip-gate
